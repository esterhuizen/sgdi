# /etc/systemd/system/sgdi-staging.service.d/shadow.conf
#
# Drop-in override for the staging sgdi service: point it at the shadow
# published directory instead of the canonical one. With this in place
# test.gdindex.app renders the MaxMind-merged geo world (override >
# maxmind > stakewiz/canonical) while gdindex.app keeps showing canonical.
#
# The shadow published dir is populated by Pass B inside gdi-publish.ts on
# every successful ingest cycle (every 30 min). If Pass B fails for a cycle,
# the existing files just stay in place — staging serves slightly stale
# shadow data but doesn't 404.
#
# Toggle off: remove this drop-in (or set SGDI_PUBLISHED_DIR back to
# /var/lib/sgdi/published) and `systemctl restart sgdi-staging`.
#
# Install: cp this file to /etc/systemd/system/sgdi-staging.service.d/shadow.conf
#          systemctl daemon-reload && systemctl restart sgdi-staging

[Service]
Environment=SGDI_PUBLISHED_DIR=/var/lib/sgdi/published-shadow
# Fall-through: when a file (e.g. historical leaderboard, methodology, pool-fees)
# isn't in the shadow tree, read from canonical. Mirrors the nginx
# `try_files $uri @gdi_canonical` behaviour for SSR-side reads.
Environment=SGDI_FALLBACK_PUBLISHED_DIR=/var/lib/sgdi/published
