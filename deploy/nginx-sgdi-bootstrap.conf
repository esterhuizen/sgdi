# /etc/nginx/sites-available/sgdi-bootstrap
#
# HTTP-only config for first-time cert issuance via certbot --webroot.
# Once the cert is issued, swap to nginx-sgdi.conf for the full TLS setup.

server {
    listen 80;
    listen [::]:80;
    server_name sgdi.app;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 "SGDI bootstrap — TLS not yet issued. Try https://sgdi.app/ shortly.\n";
        add_header Content-Type text/plain;
    }
}
