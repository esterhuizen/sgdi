# /etc/nginx/sites-available/sgdi
#
# sgdi.app: 301 redirects EVERYTHING to gdindex.app (including JSON paths
# like /gdi/*). Preserves any external links/shares that point at sgdi.app.
# Keep this redirect-only block + the LE cert alive — sgdi.app's cert auto-
# renews via the existing certbot timer.

server {
    listen 80;
    listen [::]:80;
    server_name sgdi.app;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://gdindex.app$request_uri; }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name sgdi.app;

    ssl_certificate     /etc/letsencrypt/live/sgdi.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sgdi.app/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    return 301 https://gdindex.app$request_uri;
}
