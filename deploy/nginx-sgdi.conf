# /etc/nginx/sites-available/sgdi
#
# Production config for sgdi.app. Two server blocks (HTTP redirect + HTTPS
# main). Same SSL settings as definity.finance — TLS 1.2/1.3, modern ciphers,
# HSTS preload (.app is preloaded at the TLD level too).
#
# Layout:
#   - /gdi/*   served directly from /var/lib/sgdi/published/ (durable, survives deploys)
#   - /_next/static/*   long-cache, proxied to Next
#   - /favicon, images   medium-cache, proxied to Next
#   - everything else   proxied to Next (sgdi.service on 127.0.0.1:4400)
#
# The /gdi/ alias is the analogue of definity's /reports/ alias — keeps the
# generated JSON outside the release tree so it survives redeploys.
#
# After install:
#   sudo cp deploy/nginx-sgdi.conf /etc/nginx/sites-available/sgdi
#   sudo ln -sf /etc/nginx/sites-available/sgdi /etc/nginx/sites-enabled/sgdi
#   sudo nginx -t && sudo systemctl reload nginx

# Redirect HTTP -> HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name sgdi.app;

    # ACME challenge for certbot renewals
    location /.well-known/acme-challenge/ { root /var/www/certbot; }

    location / { return 301 https://$host$request_uri; }
}

# Apex HTTPS
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name sgdi.app;

    ssl_certificate     /etc/letsencrypt/live/sgdi.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sgdi.app/privkey.pem;

    # SSL settings (Mozilla "intermediate", inlined — matches definity.finance)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    server_tokens off;
    client_max_body_size 1m;

    # Security headers (.app is HSTS-preloaded at TLD level; this is belt-and-braces)
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;

    # Rate limit using the existing app zone defined in /etc/nginx/conf.d/definity-ratelimit.conf
    limit_req zone=app burst=40 nodelay;

    # Static published JSON — durable across deploys.
    location /gdi/ {
        alias /var/lib/sgdi/published/;
        try_files $uri =404;
        add_header Cache-Control "public, max-age=300";
        add_header Access-Control-Allow-Origin "*";
        add_header Access-Control-Allow-Methods "GET";
    }

    # Next.js static — hard cache
    location /_next/static/ {
        proxy_pass http://127.0.0.1:4400;
        proxy_cache_valid 200 365d;
        expires 365d;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Public-dir assets — short cache
    location ~* \.(?:ico|png|jpg|jpeg|gif|webp|avif|svg|woff2?|ttf|eot)$ {
        proxy_pass http://127.0.0.1:4400;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        access_log off;
    }

    # Everything else -> Next.js
    location / {
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_pass http://127.0.0.1:4400;
    }
}
