# Cloudflare real-IP awareness + trusted-source flag.
#
# Two related concerns, both http-context, kept in one file.
#
# 1. set_real_ip_from + real_ip_header:
#    When Cloudflare proxies the site, the TCP source IP is a CF edge.
#    The visitor's real IP arrives in CF-Connecting-IP. Listing CF's
#    published CIDRs as trusted sources tells nginx to substitute the
#    header value into $remote_addr (used by logs, rate-limiting, etc.)
#    when (and ONLY when) the connection comes from a CF edge.
#
# 2. geo $realip_remote_addr → $cf_trusted_origin:
#    The realip module rewrites $remote_addr BEFORE the access phase
#    runs, so a naïve `allow`/`deny` ACL would compare against the
#    visitor's home IP — not the CF edge IP. Use $realip_remote_addr
#    (which preserves the original TCP source) to determine whether
#    the request actually came through Cloudflare. This variable is
#    then used by nginx-cloudflare-allow.conf in the server block.
#
# Source for CIDR lists: https://www.cloudflare.com/ips/  (refresh quarterly)

# IPv4
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;

# IPv6
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;

real_ip_header    CF-Connecting-IP;
real_ip_recursive on;

# Trust flag — 1 if the TCP source IP is a Cloudflare edge, else 0.
# Operates on $realip_remote_addr (the original peer address, BEFORE the
# realip module rewrites $remote_addr to the visitor's home IP).
geo $realip_remote_addr $cf_trusted_origin {
    default 0;

    # IPv4
    173.245.48.0/20  1;
    103.21.244.0/22  1;
    103.22.200.0/22  1;
    103.31.4.0/22    1;
    141.101.64.0/18  1;
    108.162.192.0/18 1;
    190.93.240.0/20  1;
    188.114.96.0/20  1;
    197.234.240.0/22 1;
    198.41.128.0/17  1;
    162.158.0.0/15   1;
    104.16.0.0/13    1;
    104.24.0.0/14    1;
    172.64.0.0/13    1;
    131.0.72.0/22    1;

    # IPv6
    2400:cb00::/32 1;
    2606:4700::/32 1;
    2803:f800::/32 1;
    2405:b500::/32 1;
    2405:8100::/32 1;
    2a06:98c0::/29 1;
    2c0f:f248::/32 1;
}
