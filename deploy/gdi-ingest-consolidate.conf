# /etc/systemd/system/gdi-ingest.service.d/consolidate.conf
#
# Canonical pipeline consolidation (2026-05-30). Points the merged-geo pass
# (Pass B / runShadowPass in scripts/gdi-publish.ts) at the SAME directory as
# Pass A (/var/lib/sgdi/published) instead of the separate published-shadow
# tree. Pass B's merged files overwrite Pass A's Stakewiz versions in place,
# and the `mergedOwnsGeo` gate in gdi-publish.ts makes Pass A defer the
# write-once frozen leaderboard-<epoch>.json to Pass B (so the frozen snapshot
# carries merged geo, not stale Stakewiz).
#
# Net effect: /var/lib/sgdi/published/ is the single merged published tree
# nginx serves at gdindex.app. The old published-shadow/ tree stops updating
# (kept as a frozen rollback reference for ~2 weeks).
#
# Install: cp to /etc/systemd/system/gdi-ingest.service.d/consolidate.conf
#          systemctl daemon-reload
# Revert:  rm the drop-in + daemon-reload (Pass B reverts to published-shadow/).

[Service]
Environment=SGDI_SHADOW_PUBLISHED_DIR=/var/lib/sgdi/published
