# Origin lockdown — reject anything that didn't come through Cloudflare.
#
# Status: DEFERRED PRE-LAUNCH. Prepped but not currently included from any
# server block. The risk it mitigates (origin-IP DDoS that bypasses CF) is
# real but not load-bearing for launch; activating without testing time
# means risking that the lockdown blocks real visitors. Defer + revisit.
#
# When activated, every request entering a port-443 server block is checked
# against $cf_trusted_origin (set by nginx-cloudflare-real-ip.conf, which
# lives in /etc/nginx/conf.d/). Anything whose original TCP source isn't
# a Cloudflare edge gets HTTP 403.
#
# Why not `allow` / `deny`?
#   The http_realip_module rewrites $remote_addr to the visitor's home IP
#   (from CF-Connecting-IP) BEFORE the access phase runs. So a naïve
#   `allow 173.245.48.0/20; ... deny all;` ACL ends up comparing against
#   the visitor's home IP and rejecting them. The geo-on-$realip_remote_addr
#   approach (used here) checks the original TCP source instead, which is
#   what we actually care about. This bit us during pre-launch testing.
#
# DO NOT include this in:
#   - port 80 server blocks (must stay open for Let's Encrypt ACME challenges
#     and HTTP→HTTPS redirects)
#   - server blocks for hostnames NOT proxied by Cloudflare
#     (e.g. test.definity.finance, which stays grey-cloud / DNS-only)

if ($cf_trusted_origin = 0) {
    return 403;
}

# ──────────────────────────────────────────────────────────────────────
# ACTIVATION:
#
#   1. Copy both snippets onto the host:
#        sudo cp deploy/nginx-cloudflare-real-ip.conf /etc/nginx/conf.d/
#        sudo cp deploy/nginx-cloudflare-allow.conf   /etc/nginx/
#
#   2. Add this line at the top of each port-443 server block that should
#      be locked down (after the SSL directives):
#
#          include /etc/nginx/cloudflare-allow.conf;
#
#   3. sudo nginx -t && sudo systemctl reload nginx
#
#   4. Verify proxied traffic still works (use a browser-like UA — some
#      CF zones block default curl UA at the edge):
#          curl -sI -A "Mozilla/5.0" https://gdindex.app/      # → 200
#          curl -sI -A "Mozilla/5.0" https://definity.finance/ # → 200
#
#   5. Verify direct-IP bypass is blocked:
#          curl -skI --resolve gdindex.app:443:<origin-ip> https://gdindex.app/
#       → should return HTTP 403 (proves Cloudflare-only access)
#
# Test from OUTSIDE the origin host. Local curl on the origin can short-
# circuit DNS to itself and not exercise the real CF→origin path, giving
# misleading results.
#
# ROLLBACK: comment out the include line in each server block, then
# `sudo nginx -t && sudo systemctl reload nginx`. Direct traffic is allowed
# again immediately.
# ──────────────────────────────────────────────────────────────────────
